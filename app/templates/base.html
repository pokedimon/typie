<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Тайпи</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/simplebar@latest/dist/simplebar.css" />
    <link rel="stylesheet" href="../static/css/output.css">
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
            url("{{ url_for('static', filename='img/background.jpg') }}");
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body class="relative flex flex-col min-h-screen font-montserrat" x-data="hashModal()" x-init="init()">
    <nav
        class=" bg-medium-jungle-900/80 text-gray-300 rounded-b-2xl px-6 py-4 mx-4 flex justify-between items-center backdrop-blur-xs">
        <div class="flex items-center space-x-7 text-lg">
            <a href="{{ url_for('index') }}" class="text-2xl font-press-start text-bright-lemon-300">Тайпи</a>
            <a href="{{ url_for('leaderboard') }}" class="hover:text-white transition-colors duration-100">Таблица
                лидеров</a>
            <a href="{{ url_for('sandbox') }}" class="hover:text-white transition-colors duration-100">Песочница</a>
        </div>
        <div class="flex items-center space-x-4">
            {% if current_user.is_authenticated %}
            <a href="{{ url_for('profile', user_id=current_user.id) }}" class="text-white hover:text-bright-lemon-400 transition-colors duration-200 flex items-center gap-3">
                <span class="font-bold">{{ current_user.first_name }} {{ current_user.last_name }}</span>
                <img src="data:image/png;base64,{{ current_user.avatar_b64 }}" alt="Profile" class="w-10 h-10 rounded-full object-cover border-2 border-bright-lemon-400 shadow-md">
            </a>
            {% else %}
            <a href="#login" @click="window.location.hash = '#login'"
                class="bg-bright-lemon-400 hover:bg-bright-lemon-600 text-gray-900 font-bold py-2 px-6 rounded-full font-montserrat transition-colors duration-200">
                Вход
            </a>
            <a href="#register" @click="window.location.hash = '#register'"
                class="bg-bright-lemon-400 hover:bg-bright-lemon-600 text-gray-900 font-bold py-2 px-6 rounded-full font-montserrat transition-colors duration-200">
                Регистрация
            </a>
            {% endif %}
        </div>
    </nav>
    {% block content %}{% endblock %}
    <div x-show="currentHash === '#register' || currentHash === '#login'"
        class="transition duration-300 fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"
        x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
        x-transition:leave="transition duration-300" x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0" role="dialog">
        <div x-transition:enter="transition-all duration-300 ease-out"
            x-transition:enter-start="opacity-0 -translate-y-20" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition-all duration-300 ease-in"
            x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-20"
            @click.outside="closeModal()"
            class="bg-medium-jungle-900/90 w-[35vw] min-w-sm min-h-50 rounded-4xl shadow-lg relative backdrop-blur-xs p-8 border border-white/10">
            <button @click="closeModal" class="absolute top-4 right-4 text-white hover:text-gray-300 text-xl">
                <span class="material-symbols-rounded">
                    close
                </span>
            </button>
            <div x-show="currentHash === '#register'">
                <h2 class="text-2xl font-bold text-white mb-6 text-center">Регистрация</h2>
                <form method="POST" class="flex flex-col gap-3 text-white" x-data="{ inSchool: false }"
                    @submit.prevent="submitRegister">
                    <input type="text" placeholder="Логин" name="login" x-model="login" required
                        class="border border-white/20 bg-white/5 text-white p-3 rounded-full focus:outline-none focus:border-bright-lemon-400 transition-colors">
                    <input type="password" placeholder="Пароль" name="password" x-model="password" required
                        class="border border-white/20 bg-white/5 text-white p-3 rounded-full focus:outline-none focus:border-bright-lemon-400 transition-colors">
                    <input type="password" placeholder="Повторите пароль" name="passwordRpt" x-model="passwordRpt"
                        required class="border border-white/20 bg-white/5 text-white p-3 rounded-full mb-4 focus:outline-none focus:border-bright-lemon-400 transition-colors">
                    <input type="text" placeholder="Фамилия" name="lastName" x-model="lastName" required
                        class="border border-white/20 bg-white/5 text-white p-3 rounded-full focus:outline-none focus:border-bright-lemon-400 transition-colors">
                    <input type="text" placeholder="Имя" name="firstName" x-model="firstName" required
                        class="border border-white/20 bg-white/5 text-white p-3 rounded-full focus:outline-none focus:border-bright-lemon-400 transition-colors">
                    <div class="flex flex-row justify-between items-center px-3">
                        <div class="flex flex-row items-center gap-3 py-3 border border-transparent">
                            Ученик школы
                            <input type="checkbox" id="inSchool" name="inSchool" x-model="inSchool"
                                class="peer" hidden>
                            <label for="inSchool"
                                class="size-6 rounded-full border-white border-2 peer-checked:bg-bright-lemon-400 peer-checked:border-bright-lemon-400"></label>
                        </div>
                        <div class="flex flex-row items-center gap-3" x-show="inSchool">
                            Класс
                            <div class="relative w-full">
                                <input type="number" name="grade" placeholder="1-11" x-model="filterGrade"
                                    x-on:keydown="if ($event.key === '-' || $event.key === 'Subtract') $event.preventDefault()"
                                    x-on:input="let val = $event.target.value.replace(/[^0-9]/g, ''); if (val !== '') { val = Math.min(Math.max(Number(val), 1), 11); $event.target.value = val; filterGrade = Number(val) } else { filterGrade = '' }"
                                    min="1" max="11" step="1" title="Введите класс от 1 до 11"
                                    class="w-full px-4 py-3 border border-white/20 bg-white/5 text-white rounded-full focus:outline-none focus:border-bright-lemon-400 transition-colors">
                            </div>
                        </div>
                    </div>
                    
                    <div id="register-messages" class="flex flex-col gap-1"></div>
                    {% for m in message %}
                    <p class="text-red-500">{{ m }}</p>
                    {% endfor %}
                    <input type="submit" value="Зарегистрироваться"
                        class="bg-bright-lemon-400 hover:bg-bright-lemon-600 text-gray-900 font-bold mt-4 py-2 px-6 rounded-full font-montserrat transition-colors duration-200">
                </form>
            </div>
            <div x-show="currentHash === '#login'">
                <h2 class="text-2xl font-bold text-white mb-6 text-center">Вход</h2>
                <form method="POST" class="flex flex-col gap-3 text-white" @submit.prevent="submitLogin">
                    <input type="text" placeholder="Логин" name="login" x-model="login" required
                        class="border border-white/20 bg-white/5 text-white p-3 rounded-full focus:outline-none focus:border-bright-lemon-400 transition-colors">
                    <input type="password" placeholder="Пароль" name="password" x-model="password" required
                        class="border border-white/20 bg-white/5 text-white p-3 rounded-full focus:outline-none focus:border-bright-lemon-400 transition-colors">
                    
                    <div id="login-messages" class="flex flex-col gap-1"></div>
                    <input type="submit" value="Войти"
                        class="bg-bright-lemon-400 hover:bg-bright-lemon-600 text-gray-900 font-bold mt-4 py-2 px-6 rounded-full font-montserrat transition-colors duration-200">
                </form>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/simplebar@latest/dist/simplebar.min.js"></script>
    <script src="{{ url_for('static', filename='js/modal-route.js') }}?v=1"></script>
</body>

</html>
