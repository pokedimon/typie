{% extends "base.html" %}

{% block content %}
<main x-data="gameHandler()">
    <div class="grow flex flex-col items-center justify-center p-5 gap-5 text-white" x-init="init()"
        @keydown.window="handleInput">
        <div
            class="flex items-center justify-between w-1/2 max-w-300 mx-auto px-5 py-3 bg-black/60 rounded-3xl border border-[#d4e157]/30 text-base font-press-start relative">
            <span class="text-bright-lemon-300">ПЕСОЧНИЦА</span>
            <div class="text-bright-lemon-300 absolute left-1/2 transform -translate-x-1/2">
                СЧЕТ: <span x-text="score"></span>
            </div>
            <div class="flex flex-row gap-2">
                <button
                    class="bg-bright-lemon-300 text-medium-jungle-900 w-10 h-10 rounded-full flex items-center justify-center transition-transform duration-200 hover:scale-110"
                    @click="restartGame()" onclick="this.blur()">
                    <span class="material-symbols-rounded">replay</span>
                </button>
                <button
                    class="bg-bright-lemon-300 text-medium-jungle-900 w-10 h-10 rounded-full flex items-center justify-center transition-transform duration-200 hover:scale-110"
                    @click="showSettings = !showSettings; if (showSettings) loadSandboxSettings(); isPaused = showSettings && !isStartScreen && !gameOver;"
                    onclick="this.blur()">
                    <span class="material-symbols-rounded">settings</span>
                </button>
            </div>
        </div>
        <div class="w-[95vw] max-w-300 h-[70vh] bg-medium-jungle-900/60 border-4 border-bright-lemon-300 rounded-4xl relative overflow-hidden backdrop-blur-md shadow-[0_20px_60px_rgba(0,0,0,0.6)]"
            id="game-field">
            <div class="absolute top-5 left-5 right-5 flex justify-between items-center z-50 font-press-start"
                x-show="!isStartScreen && !gameOver && !isPaused && !showSettings">
                <div class="bg-black/60 px-5 py-2.5 rounded-xl border border-bright-lemon-300 text-sm">
                    ВРЕМЯ: <span x-text="timer" :class="timer < 10 ? 'text-red-500' : 'text-bright-lemon-300'"></span>
                </div>
                <div class="bg-black/60 px-5 py-2.5 rounded-xl border border-bright-lemon-300 text-sm absolute left-1/2 transform -translate-x-1/2"
                    :class="pulseClass">
                    <span x-text="roundScore"></span>
                </div>
                <div class="flex gap-4">
                    <button
                        class="bg-black/60 px-5 py-2.5 rounded-xl border border-bright-lemon-300 text-sm cursor-pointer transition-transform duration-200 hover:scale-110"
                        @click="togglePause()">ПАУЗА (ПРОБЕЛ)</button>

                </div>
            </div>
            <div class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-100 text-center p-10"
                x-show="isPaused && !showSettings && !isStartScreen" x-cloak>
                <h1 class="text-5xl text-bright-lemon-300 font-press-start mb-10">ПАУЗА</h1>
                <div class="flex gap-6">
                    <button
                        class="bg-bright-lemon-300 text-medium-jungle-900 px-11 py-4 rounded-[2.5rem] font-press-start text-lg border-none cursor-pointer transition-all duration-200 shadow-[0_10px_0_#939d33] hover:-translate-y-1 hover:shadow-[0_12px_0_#939d33] active:translate-y-2 active:shadow-[0_3px_0_#939d33]"
                        @click="togglePause()">ПРОДОЛЖИТЬ</button>
                </div>
            </div>
            <div class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-200 text-center p-10"
                x-show="gameOver" x-cloak>
                <h1 class="text-4xl text-bright-lemon-300 font-press-start mb-6">ВРЕМЯ ВЫШЛО!</h1>
                <p class="text-xl mb-4" x-text="roundScore !== 0 ? 'Ты отлично справился!' : 'Попробуй снова!'"></p>
                <div class="text-5xl text-yellow-green-400 font-press-start mb-10 transition-colors duration-300"
                    x-text="roundScore" :class="pulseClass"></div>
                <div class="flex gap-6">
                    <button
                        class="bg-bright-lemon-300 text-medium-jungle-900 px-11 py-4 rounded-[2.5rem] font-press-start text-lg border-none cursor-pointer transition-all duration-200 shadow-[0_10px_0_#939d33] hover:-translate-y-1 hover:shadow-[0_12px_0_#939d33] active:translate-y-2 active:shadow-[0_3px_0_#939d33]"
                        @click="restartGame()">СНАЧАЛА</button>
                </div>
            </div>
            <div class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-200 text-center p-10"
                x-show="isStartScreen && !showSettings" x-cloak>
                <h1 class="text-4xl text-bright-lemon-300 font-press-start mb-6">ТРОФЕЙНАЯ ОХОТА</h1>
                <p class="text-lg mb-10 max-w-xl">Нажимай на буквы, которые появляются на экране, чтобы поймать как
                    можно больше обезьянок! </p>
                <div class="flex gap-6">
                    <button
                        class="bg-bright-lemon-300 text-medium-jungle-900 px-10 py-4 rounded-[2.5rem] font-press-start text-lg border-none cursor-pointer transition-all duration-200 shadow-[0_10px_0_#939d33] hover:-translate-y-1 hover:shadow-[0_12px_0_#939d33] active:translate-y-2 active:shadow-[0_3px_0_#939d33]"
                        @click="startRound()">ИГРАТЬ</button>
                </div>
            </div>
            <div class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-200 text-center p-10"
                x-show="showSettings" x-cloak>
                <h2 class="text-3xl text-bright-lemon-300 font-press-start mb-10">НАСТРОЙКИ</h2>
                <div class="flex flex-col gap-6 w-full max-w-md text-left">
                    <div>
                        <label class="block text-yellow-green-400 font-bold mb-2">Буквы (без пробелов):</label>
                        <input type="text" x-model="sandbox.letters"
                            @input="sandbox.letters = [...new Set($event.target.value.replace(/[^А-Яа-я]/g, '').toUpperCase().split('').sort())].join('')"
                            class="w-full bg-black/50 border-2 border-yellow-green-500 rounded-xl p-3 text-white text-lg font-bold outline-none uppercase"
                            placeholder="АБВГД...">
                    </div>
                    <div>
                        <label class="block text-yellow-green-400 font-bold mb-2">Скорость падения (<span
                                x-text="sandbox.speed"></span>x):</label>
                        <input type="range" x-model.number="sandbox.speed" min="1" max="5" step="1"
                            class="w-full accent-yellow-green-500">
                    </div>
                    <div>
                        <label class="block text-yellow-green-400 font-bold mb-2">Время раунда (сек):</label>
                        <select x-model.number="sandbox.time"
                            class="w-full bg-black/50 border-2 border-yellow-green-500 rounded-xl p-3 text-white text-lg outline-none">
                            <option value="30">30</option>
                            <option value="60">60</option>
                            <option value="90">90</option>
                            <option value="120">120</option>
                            <option value="180">180</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-yellow-green-400 font-bold mb-2">Обезьянка:</label>
                        <select x-model="sandbox.skin"
                            class="w-full bg-black/50 border-2 border-yellow-green-500 rounded-xl p-3 text-white text-2xl outline-none">
                            <option value="🐒" selected>🐒 Мартышка</option>
                            <option value="🦍">🦍 Горилла</option>
                            <option value="🦧">🦧 Орангутан</option>
                        </select>
                    </div>
                </div>
                <button
                    class="bg-bright-lemon-300 text-medium-jungle-900 mt-10 px-10 py-4 rounded-[2.5rem] font-press-start text-base border-none cursor-pointer transition-all duration-200 shadow-[0_10px_0_#939d33] hover:-translate-y-1 hover:shadow-[0_12px_0_#939d33] active:translate-y-2 active:shadow-[0_3px_0_#939d33]"
                    @click="showSettings = false; saveProgress(); restartGame();">СОХРАНИТЬ И ПЕРЕЗАПУСТИТЬ</button>
            </div>
            <template x-for="monkey in monkeys" :key="monkey.id">
                <div class="absolute text-[5rem] flex flex-col items-center justify-center drop-shadow-[0_8px_10px_rgba(0,0,0,0.4)] will-change-transform select-none"
                    :class="{'monkey-exit': monkey.isCaught}" :style="`left: ${monkey.x}px; top: ${monkey.y}px;`"
                    x-show="!monkey.removed">
                    <span x-text="sandbox.skin"></span>
                    <div class="absolute -top-4 bg-white text-medium-jungle-900 w-12 h-12 rounded-full flex items-center justify-center font-black text-[2rem] border-5 border-yellow-green-300 shadow-[0_5px_15px_rgba(0,0,0,0.3)]"
                        x-text="monkey.letter"></div>
                </div>
            </template>
        </div>
    </div>
</main>
<script src="{{ url_for('static', filename='js/game-logic.js') }}"></script>
{% endblock %}
